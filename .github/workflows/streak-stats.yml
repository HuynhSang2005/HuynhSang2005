name: Generate Streak Stats

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate GitHub Streak Stats
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          options: user=HuynhSang2005&theme=default
          path: profile-summary-card-output/streak.svg

      - name: Commit generated files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .
          git commit -m "Update streak stats" || exit 0
          git push